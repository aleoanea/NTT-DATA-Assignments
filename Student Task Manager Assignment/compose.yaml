services:
  postgres:
    image: postgres:16
    container_name: nttstudents-database
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: nttstudents
      POSTGRES_USER: ntt
      POSTGRES_PASSWORD: ntt
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: nttstudents-app
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nttstudents
      SPRING_DATASOURCE_USERNAME: ntt
      SPRING_DATASOURCE_PASSWORD: ntt

volumes:
  postgres_data: